name: CI

on:
  push:
    branches: [main, revamp]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        # The heavy ML libraries (torch, sentence-transformers, faiss, arango,
        # datasets) are imported lazily, so unit tests need only this light set.
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy scikit-learn scipy requests pytest ruff

      - name: Lint (ruff)
        run: ruff check src scripts tests

      - name: Test (pytest)
        run: pytest
